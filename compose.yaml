services:
  bot:
    build: .
    image: truenas-telegram-bot:local
    restart: unless-stopped
    env_file: .env
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 384m
    cpus: 1.0
